name: Build and deploy Python project to Azure Function App - va-func-weather-collector

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies into Azure Functions package folder
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt --target ".python_packages/lib/site-packages"

      - name: Create deployment zip
        run: |
          rm -f release.zip
          zip -r release.zip . \
            -x "*.git*" \
            -x "venv/*" \
            -x "__pycache__/*" \
            -x "*.pyc"

      - name: Verify zip exists
        run: ls -la release.zip

      - name: Deploy to Azure Functions (Flex Consumption)
        uses: Azure/functions-action@v1
        with:
          app-name: "va-func-weather-collector"
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_318F0832F0164857990995556DC891F7 }}
          sku: flexconsumption
          package: release.zip